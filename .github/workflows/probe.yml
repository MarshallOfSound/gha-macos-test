name: probe

on:
  push:
  workflow_dispatch:

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: |
          chmod +x build.sh sweep.sh
          ./build.sh
          file Probe.app/Contents/MacOS/Probe
      - name: sweep
        run: ./sweep.sh
